<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Interaction Typography</title>
    <!-- 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #guide-text {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">인터랙션 시작하기</button>
        <div id="guide-text">
            마이크 권한 허용 후 말을 해보세요.<br>
            소리를 크게 내면 단어들이 튕겨 나갑니다.
        </div>
    </div>

<script>
/**
 * Voice Interaction Typography
 * Inspired by CMISCM 'Typo Noise'
 */

const { Engine, World, Bodies, Body, Vector, Composite } = Matter;

let engine, world;
let ground, wallLeft, wallRight;
let words = [];
let mic, recognition;
let isStarted = false;
let canvas;

function setup() {
    canvas = createCanvas(windowWidth, windowHeight);
    
    // 1. Matter.js 엔진 초기화
    engine = Engine.create();
    world = engine.world;
    engine.gravity.y = 1.0; // 중력

    // 경계벽 생성 (화면 밖으로 나가지 않게)
    const wallOptions = { isStatic: true, friction: 0.5, restitution: 0.7 };
    ground = Bodies.rectangle(width/2, height + 50, width, 100, wallOptions);
    wallLeft = Bodies.rectangle(-50, height/2, 100, height, wallOptions);
    wallRight = Bodies.rectangle(width + 50, height/2, 100, height, wallOptions);
    World.add(world, [ground, wallLeft, wallRight]);

    // 마이크 객체 미리 생성
    mic = new p5.AudioIn();

    // UI 이벤트 연결
    document.getElementById('start-btn').addEventListener('click', startInteraction);

    textFont('Helvetica, Arial, sans-serif');
    textStyle(BOLD);
}

function startInteraction() {
    // 로컬 파일 시스템(file://)에서 실행 중인지 확인
    if (window.location.protocol === 'file:') {
        alert("알림: 보안 정책으로 인해 로컬 파일(file://) 환경에서는 마이크 권한 요청이 차단될 수 있습니다. 'Live Server' 등을 사용하거나 서버 환경에서 실행해 주세요.");
    }

    // p5.sound의 AudioContext를 재개합니다.
    userStartAudio().then(() => {
        // 마이크 시작 (성공/실패 콜백 추가)
        mic.start(() => {
            console.log("마이크 활성화 성공");
            initSpeechRecognition();
            
            document.getElementById('ui-layer').classList.add('hidden');
            isStarted = true;
        }, (err) => {
            console.error("마이크 활성화 실패:", err);
            alert("마이크 권한을 허용해야 인터랙션이 가능합니다. 브라우저 주소창 옆의 자물쇠 아이콘을 눌러 마이크 권한을 확인해주세요.");
        });
    }).catch(err => {
        console.error("Audio Context 시작 실패:", err);
    });
}

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 사용을 권장합니다.");
        return;
    }
    
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true; // 중간 결과 포함 (더 역동적임)
    recognition.lang = 'ko-KR';

    recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            // 확정된 결과만 단어로 생성
            if (event.results[i].isFinal) {
                let transcript = event.results[i][0].transcript.trim();
                let newWords = transcript.split(' ');
                newWords.forEach(w => {
                    if (w.length > 0) createWordObject(w);
                });
            }
        }
    };

    // 오류 처리 추가
    recognition.onerror = (event) => {
        console.error("음성 인식 오류:", event.error);
        if (event.error === 'not-allowed') {
            console.warn("음성 인식 권한이 거부되었습니다.");
        }
    };

    // 인식이 끊기면 자동 재시작
    recognition.onend = () => {
        if (isStarted) {
            try {
                recognition.start();
            } catch (e) {
                console.warn("음성 인식 재시작 중 오류:", e);
            }
        }
    };
    
    try {
        recognition.start();
    } catch (e) {
        console.error("음성 인식 시작 실패:", e);
    }
}

function draw() {
    if (!isStarted) {
        background(0);
        return;
    }

    // 마이크 볼륨 분석 (0.0 ~ 1.0)
    let vol = mic.getLevel();
    
    // 배경색: 소리 크기에 따라 미세하게 밝아짐
    let bgBrightness = map(vol, 0, 0.5, 10, 80);
    background(bgBrightness);

    // 엔진 업데이트
    Engine.update(engine);

    // 인터랙션: 일정 볼륨 이상이면 모든 단어에 충격파 발생
    if (vol > 0.12) {
        applySoundForce(vol);
        // 화면 흔들림 효과 (Shake)
        translate(random(-vol * 20, vol * 20), random(-vol * 20, vol * 20));
    }

    // 단어들 그리기
    for (let i = words.length - 1; i >= 0; i--) {
        let w = words[i];
        renderWord(w, vol);

        // 최적화: 화면 아래로 떨어진 객체 제거
        if (w.body.position.y > height + 200) {
            World.remove(world, w.body);
            words.splice(i, 1);
        }
    }
}

function createWordObject(txt) {
    textSize(48);
    let tw = textWidth(txt) + 20;
    let th = 50;
    
    // 생성 위치: 상단 랜덤
    let x = random(tw, width - tw);
    let y = -100;
    
    let body = Bodies.rectangle(x, y, tw, th, {
        restitution: 0.6, // 탄성
        friction: 0.2,
        chamfer: { radius: 10 } // 약간 둥근 모서리
    });
    
    // 초기 회전값 랜덤
    Body.setAngle(body, random(-QUARTER_PI, QUARTER_PI));
    
    World.add(world, body);
    words.push({ body, text: txt, w: tw, h: th });
}

function renderWord(w, vol) {
    const pos = w.body.position;
    const angle = w.body.angle;

    push();
    translate(pos.x, pos.y);
    rotate(angle);
    
    // 소리가 클 때 단어가 미세하게 커짐
    let s = 1.0;
    if (vol > 0.12) s = 1.0 + (vol * 2);
    scale(s);

    textAlign(CENTER, CENTER);
    textSize(48);
    
    // 텍스트 드로잉 (그림자 효과로 가독성 높임)
    fill(0, 100);
    text(w.text, 2, 2); 
    
    // 본문 텍스트: 소리가 클 때 색상 반전 효과
    if (vol > 0.15) {
        fill(255, 220, 0); // 노란색 (강조)
    } else {
        fill(255);
    }
    
    text(w.text, 0, 0);
    pop();
}

function applySoundForce(power) {
    words.forEach(w => {
        // 단어마다 랜덤한 방향과 위쪽으로 솟구치는 힘 부여
        let forceMagnitude = power * 0.15;
        let force = {
            x: random(-forceMagnitude, forceMagnitude),
            y: -forceMagnitude * random(1, 3)
        };
        Body.applyForce(w.body, w.body.position, force);
    });
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    Body.setPosition(ground, { x: width/2, y: height + 50 });
}

</script>
</body>
</html>
